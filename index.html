<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Amith Portfolio</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
</div>

<!-- HERO -->
<section class="hero">
  <h1>I Build Websites</h1>
  <p>Modern. Fast. Beautiful. I create websites that help businesses grow.</p>
</section>

<!-- PROJECTS -->
<section class="projects">

  <div class="card">
    <img src="https://via.placeholder.com/400x300">
    <div class="overlay">
      <h3>Project 1</h3>
      <p>View Project</p>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/400x300">
    <div class="overlay">
      <h3>Project 2</h3>
      <p>View Project</p>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/400x300">
    <div class="overlay">
      <h3>Project 3</h3>
      <p>View Project</p>
    </div>
  </div>

</section>

<!-- ABOUT -->
<section class="about">
  <h2>About Me</h2>
  <p>I’m Amith, a web developer from Bengaluru. I build clean, modern, responsive websites for businesses and personal brands.</p>
</section>

<!-- JS -->
<script>
// LOADER
window.addEventListener("load", () => {
  document.getElementById("loader").style.display = "none";
});

// SCROLL REVEAL
window.addEventListener("scroll", () => {
  document.querySelectorAll(".card").forEach(card => {
    let position = card.getBoundingClientRect().top;
    let screenHeight = window.innerHeight;

    if (position < screenHeight - 100) {
      card.style.opacity = 1;
      card.style.transform = "translateY(0)";
    }
  });
});

// TILT
document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("mousemove", e => {
    let rect = card.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;

    let centerX = rect.width / 2;
    let centerY = rect.height / 2;

    let rotateX = -(y - centerY) / 10;
    let rotateY = (x - centerX) / 10;

    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  });

  card.addEventListener("mouseleave", () => {
    card.style.transform = "rotateX(0) rotateY(0)";
  });
});
</script>

</body>
</html>
