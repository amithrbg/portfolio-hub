<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact | IronFit Gym</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <nav>
    <a class="logo" href="index.html">IronFit</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>
</header>
<main>
  <section class="contact-section">
    <h1 style="color:var(--accent);margin-top:0;">Contact Us</h1>
    <p>Questions? Ready to start your journey? Book a class or leave us a message!</p>
    <form class="contact-form">
      <input type="text" name="name" placeholder="Your Name*" required>
      <input type="email" name="email" placeholder="Your Email*" required>
      <input type="text" name="subject" placeholder="Subject" required>
      <textarea name="message" rows="4" placeholder="Message*" required></textarea>
      <button type="submit" class="button">Send Message</button>
    </form>
    <div class="contact-details">
      <p>
        📞 <b>Phone:</b> 555-123-4567<br>
        ✉️ <b>Email:</b> hello@ironfitgym.com<br>
        📍 <b>Location:</b> 100 Fitness Ave, Your City, Country
      </p>
    </div>
  </section>
</main>
<footer>
  &copy; 2026 IronFit Gym
</footer>
</body>
</html>
